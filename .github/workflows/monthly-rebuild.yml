name: Monthly Database Rebuild

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Run census
        id: census
        shell: bash
        run: |
          set +e
          npm run census 2>&1 | tee census.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run ingest
        id: ingest
        shell: bash
        run: |
          set +e
          npm run ingest 2>&1 | tee ingest.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build database
        id: build_db
        shell: bash
        run: |
          set +e
          npm run build:db 2>&1 | tee build-db.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-rebuild-logs
          path: |
            census.log
            ingest.log
            build-db.log
          retention-days: 30

  report:
    needs: rebuild
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Create issue on failure
        if: needs.rebuild.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Monthly rebuild failed';
            const body = [
              `**Automated monthly rebuild:** ${new Date().toISOString()}`,
              '',
              '### Status',
              `Rebuild workflow failed. Review the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.',
              '',
              '### Recommended actions',
              '1. Check logs in workflow artifacts',
              '2. Run `npm run census`, `npm run ingest`, `npm run build:db` locally',
              '3. Re-run contract tests before release',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rebuild-failure',
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['rebuild-failure', 'automated'],
              });
            }

      - name: Close stale rebuild-failure issues on success
        if: needs.rebuild.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rebuild-failure',
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
